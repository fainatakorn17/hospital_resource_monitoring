<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Hospital Resource System</title>

    <style>
        :root {
            --bg: #070b14;
            --card: rgba(255, 255, 255, 0.06);
            --stroke: rgba(255, 255, 255, 0.08);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --blue: #3b82f6;
        }

        * {
            font-family: "Segoe UI", sans-serif;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #0b1220, #070b14);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--stroke);
        }

        .header h2 {
            margin: 0;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 24px;
        }

        h3 {
            margin-bottom: 14px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--stroke);
            padding: 18px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            margin: 0 0 8px 0;
        }

        .card p {
            color: var(--muted);
            font-size: 14px;
        }

        /* QUICK */
        .quick {
            margin-top: 18px;
            padding: 16px;
            border-radius: 14px;
            background: var(--card);
            border: 1px solid var(--stroke);
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>🏥 Hospital Resource Monitoring Service</h2>
    </div>

    <div class="container">

        <h3>Main Menu</h3>

        <div class="grid">

            <div class="card" onclick="go('dashboard.html')">
                <h3>📊 - Dashboard</h3>
                <p>Real-time resource monitoring</p>
            </div>

            <div class="card" onclick="go('hospitals.html')">
                <h3>🏥 - Hospitals</h3>
                <p>Hospital directory & details</p>
            </div>


        </div>

        <div class="quick" id="quick">
            <b>📌 System Status</b><br />
            Loading...
        </div>

    </div>

    <script>
        const BASE = "https://xvvwesom7h.execute-api.us-east-1.amazonaws.com";

        function go(page) {
            window.location.href = page;
        }

        async function loadQuick() {
            try {
                const res = await fetch(BASE + "/v1/hospitals");
                const json = await res.json();

                const hospitals = json.data || [];

                document.getElementById("quick").innerHTML = `
            <b>📌 System Status</b><br/><br/>
            🏥 Total Hospitals: ${hospitals.length}<br/>
            ⚡ System: Online
        `;
            } catch (err) {
                document.getElementById("quick").innerHTML =
                    "❌ API connection failed";
            }
        }

        loadQuick();
    </script>

</body>

</html>
